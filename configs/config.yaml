reviews:
  per_class_cap: 20000
  reviews_interim: data/interim/reviews.parquet
  reviews_interim_jsonl: data/interim/reviews.jsonl

mlflow:
  experiment_tabular: wb-tabular-rating
  experiment_text: wb-review-sentiment

tabular:
  target: rating
  features: [price, n_photos, brand, category, n_reviews, n_colors, title_len]
  log_features: [price, n_reviews]
  plain_num_features: [n_photos, n_colors, title_len]
  onehot_features: [category]
  target_enc_features: [brand]
  test_size: 0.2
  val_size: 0.1
  batch_size: 64
  epochs: 50
  lr: 0.001
  patience: 10

text:
  target: mark
  num_classes: 5
  max_len_words: 64
  max_len_tokens: 96
  vocab_size: 30000
  bert_model: DeepPavlov/rubert-base-cased
  test_size: 0.2
  val_size: 0.1
  batch_size: 64
  epochs: 10
  lr: 0.001
  embed_dim: 128
  hidden_dim: 128
  aspects: [defect, size, delivery, quality, price]
